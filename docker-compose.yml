services:
  autofabric:
    build: .
    container_name: autofabric-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV}
      APP_NAME: ${APP_NAME}
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT}
      DATABASE_URL: ${DATABASE_URL}
      DEFAULT_EXECUTOR: ${DEFAULT_EXECUTOR}
      OPENCLAW_MODE: ${OPENCLAW_MODE}
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
